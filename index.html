<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öpücük Sayacı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            animation: floatUp linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) scale(1.2) rotate(360deg);
                opacity: 0;
            }
        }

        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .title {
            color: #ff69b4;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            }
            to {
                text-shadow: 0 0 30px rgba(255, 105, 180, 0.8), 0 0 40px rgba(147, 51, 234, 0.5);
            }
        }

        .subtitle {
            color: #d8b4fe;
            font-size: 1.1rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .counter-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 105, 180, 0.3);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(147, 51, 234, 0.2);
        }

        .counter-label {
            color: #e9d5ff;
            font-size: 1.2rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .counter-value {
            color: #ff69b4;
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.6);
            transition: transform 0.2s ease;
        }

        .counter-value.pop {
            transform: scale(1.3);
        }

        .kiss-button {
            background: linear-gradient(135deg, #ff69b4 0%, #9333ea 100%);
            border: none;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            font-size: 4rem;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .kiss-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 60px rgba(255, 105, 180, 0.6);
        }

        .kiss-button:active {
            transform: scale(0.95);
        }

        .kiss-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .kiss-button:active::before {
            width: 300px;
            height: 300px;
        }

        .reset-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid rgba(255, 105, 180, 0.4);
            color: #d8b4fe;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: rgba(255, 105, 180, 0.2);
            border-color: #ff69b4;
            color: #ff69b4;
        }

        .floating-kiss {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 100;
            animation: floatKiss 1.5s ease-out forwards;
        }

        @keyframes floatKiss {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff69b4;
            border-radius: 50%;
            animation: particleFloat 3s infinite;
        }

        @keyframes particleFloat {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="hearts-container" id="heartsContainer"></div>
    <div class="particles" id="particles"></div>

    <div class="main-content">
        <h1 class="title">Öpücük Sayacı</h1>
        <p class="subtitle">Onur <3 Bilge</p>

        <div class="counter-box">
            <div class="counter-label">TOPLAM ÖPÜCÜK</div>
            <div class="counter-value" id="counter">0</div>
        </div>

        <button class="kiss-button" id="kissBtn" onclick="addKiss()">💋</button>

        <button class="reset-btn" onclick="resetCounter()">Sıfırla</button>
    </div>

    <script>
        // Sayacı localStorage'dan al veya 0 başlat
        let count = parseInt(localStorage.getItem('kissCount')) || 0;
        const counterElement = document.getElementById('counter');
        const kissBtn = document.getElementById('kissBtn');
        const heartsContainer = document.getElementById('heartsContainer');
        const particlesContainer = document.getElementById('particles');

        // İlk değeri göster
        counterElement.textContent = count;

        function addKiss() {
            count++;
            localStorage.setItem('kissCount', count);
            counterElement.textContent = count;

            // Animasyon efekti
            counterElement.classList.add('pop');
            setTimeout(() => counterElement.classList.remove('pop'), 200);

            // Uçan öpücük efekti
            createFloatingKiss();

            // Buton etrafında parçacıklar
            createParticles();
        }

        function resetCounter() {
            if (confirm('Sayacı sıfırlamak istediğine emin misin?')) {
                count = 0;
                localStorage.setItem('kissCount', 0);
                counterElement.textContent = count;
            }
        }

        function createFloatingKiss() {
            const kiss = document.createElement('div');
            kiss.className = 'floating-kiss';
            kiss.textContent = ['💋', '💖', '💕', '💗', '💓'][Math.floor(Math.random() * 5)];

            const rect = kissBtn.getBoundingClientRect();
            kiss.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 100) + 'px';
            kiss.style.top = (rect.top + (Math.random() - 0.5) * 50) + 'px';

            document.body.appendChild(kiss);
            setTimeout(() => kiss.remove(), 1500);
        }

        function createParticles() {
            const rect = kissBtn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                particle.style.background = ['#ff69b4', '#9333ea', '#e879f9', '#f0abfc'][Math.floor(Math.random() * 4)];

                const angle = (Math.PI * 2 * i) / 8;
                const distance = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.animation = `particleFloat 0.8s ease-out forwards`;
                particle.style.transform = `translate(${tx}px, ${ty}px)`;

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }

        // Arka planda uçuşan kalpler oluştur
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = ['💖', '💕', '💗', '💓', '💝', '💘', '💋'][Math.floor(Math.random() * 7)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (15 + Math.random() * 25) + 'px';
            heart.style.animationDuration = (4 + Math.random() * 6) + 's';
            heart.style.animationDelay = Math.random() * 2 + 's';
            heart.style.color = ['#ff69b4', '#e879f9', '#9333ea', '#f0abfc'][Math.floor(Math.random() * 4)];

            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 10000);
        }

        // Sürekli kalp oluştur
        setInterval(createHeart, 800);

        // İlk başta birkaç kalp oluştur
        for (let i = 0; i < 15; i++) {
            setTimeout(createHeart, i * 200);
        }
    </script>
</body>
</html>
